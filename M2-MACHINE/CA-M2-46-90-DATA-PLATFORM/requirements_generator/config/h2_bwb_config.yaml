# H2-BWB (Hydrogen Blended Wing Body) Configuration
# UTCS MI Compliant Requirements Generator

system:
  name: "H2-BWB-Q"
  version: "1.0.0"
  description: "Hydrogen-powered Blended Wing Body aircraft requirements"
  
aircraft_config:
  type: "blended_wing_body"
  propulsion: "hydrogen_fuel_cell"
  design_range: 3000  # nautical miles
  passenger_capacity: 180
  cruise_altitude: 41000  # feet
  cruise_mach: 0.78
  
design_loads:
  design_ultimate_load: 150000  # N
  design_limit_load: 100000     # N
  gust_load_factor: 2.5
  maneuver_load_factor: 3.8
  
hydrogen_system:
  storage_pressure: 70    # MPa
  storage_temperature: -253  # Celsius (liquid H2)
  fuel_cell_power: 2000   # kW
  tank_material: "Al-5083"
  piping_material: "316L"
  
materials:
  primary_structure:
    wing: "CFRP/Al-Li hybrid"
    fuselage: "Al-Li 2198"
    empennage: "CFRP"
  hydrogen_systems:
    tanks: "Al-5083"
    piping: "316L stainless steel"
    valves: "Inconel 718"
    
environmental_conditions:
  operating_temperature: [-55, 85]  # Celsius
  storage_temperature: [-65, 85]    # Celsius
  humidity: [0, 95]                 # %RH
  altitude: [0, 45000]              # feet
  vibration_spec: "MIL-STD-810G"
  
regulatory_standards:
  airworthiness:
    - "CS-25"
    - "FAR-25"
  hydrogen_safety:
    - "ISO-11114-4"
    - "ASME-BPVC-VIII"
    - "SAE-AIR6464"
  environmental:
    - "RTCA-DO-160G"
    - "MIL-STD-810G"
    
physics_solvers:
  cfd:
    solver: "OpenFOAM"
    executable: "simpleFoam"
    mesh_size: 2000000
    convergence_criteria: 1e-5
    
  fea:
    solver: "CalculiX"
    executable: "ccx"
    element_type: "C3D10"
    convergence_criteria: 1e-6
    
  thermal:
    solver: "OpenFOAM"
    executable: "chtMultiRegionFoam"
    
  hydrogen:
    compatibility_database: "ISO-11114-4"
    permeation_model: "Arrhenius"
    
validation_plugins:
  - "h2_compatibility"
  - "structural_integrity"
  - "thermal_management"
  - "regulatory_compliance"
  
output_formats:
  - "json"
  - "yaml"
  - "xlsx"
  - "doors_xml"
  
traceability:
  enabled: true
  parent_documents:
    - "System Requirements Specification"
    - "Concept of Operations"
  derived_documents:
    - "Component Requirements"
    - "Interface Requirements"
    
compliance:
  utcs_version: "2.1"
  framework: "M2-MACHINE"
  certification_level: "DAL-A"
  verification_methods: ["A", "D", "I", "T"]